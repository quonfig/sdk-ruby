AllCops:
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - lib/prefab_pb.rb
    - vendor/**/*

# Complexity / size cops are advisory. This SDK is a port of working
# production code from Prefab; the evaluator and resolver have intrinsic
# complexity that is fine to keep as-is. Re-enable selectively if a method
# becomes genuinely unmaintainable.
Metrics:
  Enabled: false

# SDK internals don't need top-level class doc comments — the public API
# is documented in README.md and the gemspec.
Style/Documentation:
  Enabled: false

# Test fixtures use name1, name2, expected1 patterns that mirror the
# source data rather than camelCase Ruby idioms.
Naming/VariableNumber:
  Enabled: false

# Short parameter names like x, y, h, c, k are readable in small math/hash
# helpers (murmur3, evaluator) and do not deserve a 3-char minimum.
Naming/MethodParameterName:
  Enabled: false

# Protobuf-generated and Prefab-style module names (e.g. OpenStruct_v1)
# legitimately use snake_case version suffixes.
Naming/ClassAndModuleCamelCase:
  Enabled: false

# Hash-only case statements are explicit and readable; not every dispatch
# needs to be table-driven.
Style/HashLikeCase:
  Enabled: false

# Predicate-shaped methods do not always end in ? (e.g. evaluate_criterion
# returns truthy/falsy but reads as a verb, not a question).
Naming/PredicateMethod:
  Enabled: false

# OpenStruct is fine for test doubles in the test suite.
Style/OpenStructUse:
  Exclude:
    - 'test/**/*'

# Class variables are intentional in singletons (Quonfig.@@lock,
# InternalLogger.@@instances) for cross-fiber coordination.
Style/ClassVars:
  Enabled: false

# Top-level dev scripts and test helpers use $global deliberately.
Style/GlobalVars:
  Exclude:
    - 'dev/**/*'
    - 'test/**/*'
    - 'scripts/**/*'

# Combining loops in dev one-off scripts (allocation_stats, benchmark)
# hurts readability when each loop is a distinct phase.
Style/CombinableLoops:
  Exclude:
    - 'dev/**/*'

# Long lines in test fixtures (encoded telemetry payloads, base64 strings)
# would be unreadable if wrapped.
Layout/LineLength:
  Max: 250
  Exclude:
    - 'test/**/*'

# Empty blocks/classes in tests are test doubles / stubs.
Lint/EmptyBlock:
  Exclude:
    - 'test/**/*'
    - 'dev/**/*'

Lint/EmptyClass:
  Exclude:
    - 'test/**/*'

# Begin/end with explicit return is used to short-circuit error paths in a
# few helpers and is clearer than refactoring to a guard clause.
Lint/NoReturnInBeginEndBlocks:
  Enabled: false

# Branches that look duplicated are often intentional documentation of
# each matched value (e.g. evaluator returning the same default for
# multiple unsupported operators). Squashing them loses the per-case
# audit trail.
Lint/DuplicateBranch:
  Enabled: false

# Unused keyword arguments are intentional API documentation: they make
# the function signature explicit even when the implementation does not
# yet (or no longer) needs the value (e.g. evaluator.evaluate_config
# accepts `resolver:` for forward compat with legacy callers).
Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

Lint/UnusedBlockArgument:
  AllowUnusedKeywordArguments: true

# WEBrick servlet handlers must define `do_GET`, `do_POST`, etc. — those
# names are required by the framework's dispatch table, not chosen by us.
Naming/MethodName:
  Exclude:
    - 'test/**/*'
