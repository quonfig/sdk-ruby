---
name: Push gem

"on":
  workflow_run:
    workflows: ["Ruby"]
    branches: [main]
    types:
      - completed

jobs:
  push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false
          ruby-version: '3.3'

      - name: Install runtime dependencies
        run: bundle install --without development --jobs 4 --retry 3

      - name: Check if version already exists
        id: version-check
        run: |
          VERSION=$(cat VERSION)
          if gem list -r quonfig | grep -q "quonfig ($VERSION)"; then
            echo "version-exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on RubyGems, skipping publish"
          else
            echo "version-exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not found, proceeding with publish"
          fi

      # Build + smoke-check the gem BEFORE rubygems/release-gem pushes it.
      # qfg-e588: 0.0.9 published with a stale gemspec manifest missing
      # lib/quonfig/evaluation_details.rb, so `require 'quonfig'` raised
      # LoadError on install. scripts/smoke_check.sh installs the built
      # .gem into a sandbox GEM_HOME and runs `ruby -rquonfig`; if the
      # require fails (or VERSION mismatches) the workflow aborts before
      # rubygems/release-gem ever runs.
      - name: Build gem
        if: steps.version-check.outputs.version-exists == 'false'
        run: |
          VERSION=$(cat VERSION)
          gem build quonfig.gemspec --output "quonfig-${VERSION}.gem"

      - name: Smoke-check built gem
        if: steps.version-check.outputs.version-exists == 'false'
        run: |
          VERSION=$(cat VERSION)
          ./scripts/smoke_check.sh "quonfig-${VERSION}.gem"

      - name: Release gem
        if: steps.version-check.outputs.version-exists == 'false'
        uses: rubygems/release-gem@v1
