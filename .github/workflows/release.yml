---
name: Release gem

# Tag-triggered: pushing a tag like v0.0.11 publishes that exact ref to
# RubyGems via OIDC trusted publishing. No tag = no publish. The job
# refuses to run unless the tag matches Quonfig::VERSION on the tagged
# commit, so VERSION drift can never silently ship.

"on":
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Test (Ruby ${{ matrix.ruby-version }}) on tagged commit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.2', '3.3', '3.4']
    steps:
      - name: Checkout sdk-ruby at tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          path: sdk-ruby

      - name: Checkout integration-test-data
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          ref: main

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f  # v1.306.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: sdk-ruby

      - name: Run tests
        working-directory: sdk-ruby
        run: bundle exec rake test

      - name: Rubocop
        working-directory: sdk-ruby
        run: bundle exec rubocop --no-color

  release:
    runs-on: ubuntu-latest
    needs: test
    environment: release

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f  # v1.306.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Verify tag matches Quonfig::VERSION
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          gem_version="$(ruby -Ilib -rquonfig/version -e 'puts Quonfig::VERSION')"
          echo "tag=${tag_version} gem=${gem_version}"
          if [ "$tag_version" != "$gem_version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match Quonfig::VERSION=${gem_version}"
            exit 1
          fi

      # Tests run in the `test` job above against the tagged commit; the
      # `needs: test` dependency on this job blocks publish if any matrix
      # entry fails. We deliberately skip bundler-audit and brakeman here —
      # those run on the test.yaml matrix on every push and would only add
      # tag-time noise without further protecting the artifact.

      - name: Build gem
        id: build
        run: |
          mkdir -p pkg
          version="$(ruby -Ilib -rquonfig/version -e 'puts Quonfig::VERSION')"
          # rubygems/release-gem@v1's post-publish step runs
          # `rubygems-await pkg/*.gem`, so the artifact has to live under pkg/.
          gem build quonfig.gemspec --output "pkg/quonfig-${version}.gem"
          echo "gem_file=pkg/quonfig-${version}.gem" >> "$GITHUB_OUTPUT"

      - name: Smoke-check built gem
        run: ./scripts/smoke_check.sh "${{ steps.build.outputs.gem_file }}"

      - name: Release gem
        uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7  # v1.2.0
