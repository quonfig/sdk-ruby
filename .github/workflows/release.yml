---
name: Release gem

# Tag-triggered: pushing a tag like v0.0.11 publishes that exact ref to
# RubyGems via OIDC trusted publishing. No tag = no publish. The job
# refuses to run unless the tag matches Quonfig::VERSION on the tagged
# commit, so VERSION drift can never silently ship.

"on":
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Verify tag matches Quonfig::VERSION
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          gem_version="$(ruby -Ilib -rquonfig/version -e 'puts Quonfig::VERSION')"
          echo "tag=${tag_version} gem=${gem_version}"
          if [ "$tag_version" != "$gem_version" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match Quonfig::VERSION=${gem_version}"
            exit 1
          fi

      # No test step here on purpose. The Ruby workflow runs the full matrix
      # on every push to main / PR; by the time you tag, that commit is
      # already green. Release's job is to verify the artifact (tag ==
      # version, gem builds, smoke check passes), not re-test the code.

      - name: Build gem
        id: build
        run: |
          version="$(ruby -Ilib -rquonfig/version -e 'puts Quonfig::VERSION')"
          gem build quonfig.gemspec --output "quonfig-${version}.gem"
          echo "gem_file=quonfig-${version}.gem" >> "$GITHUB_OUTPUT"

      - name: Smoke-check built gem
        run: ./scripts/smoke_check.sh "${{ steps.build.outputs.gem_file }}"

      - name: Release gem
        uses: rubygems/release-gem@v1
