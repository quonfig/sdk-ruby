name: Chaos

# Runs the cross-SDK chaos harness (toxiproxy + scenarios from
# integration-test-data/chaos) against sdk-ruby. Boots api-delivery in
# fixture mode and drives every scenario in scenarios/*.yaml through it.
#
# Two modes:
#   - smoke   : skips 11-null-hypothesis (the 30-minute idle scenario);
#               runs on every push to main + every PR (~18 min wall clock).
#   - full    : every scenario; runs on workflow_dispatch (~48 min).
#
# NOTE: release.yml in this repo is intentionally not modified here.
# A separate PR is fixing the release-gate problem in sdk-ruby's
# release.yml (it currently has a deliberate "no test step" stance —
# see comment in release.yml). This workflow exposes itself via
# workflow_call so that follow-up PR can wire chaos as a `needs:` on
# the release job.

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      mode:
        description: "smoke (skip 11) or full"
        required: false
        type: string
        default: smoke
  workflow_dispatch:
    inputs:
      mode:
        description: "smoke (skip 11) or full"
        required: false
        type: choice
        options: [smoke, full]
        default: smoke

jobs:
  chaos:
    name: Chaos (${{ inputs.mode || 'smoke' }})
    # The "Checkout api-delivery" step needs secrets.QUONFIG_REPO_TOKEN to
    # read the private api-delivery repo. GitHub does NOT expose Actions
    # secrets to pull_request runs triggered by Dependabot, so the token
    # input resolves to an empty string and checkout fails fast with
    # "Input required and not supplied: token". Skip the job on Dependabot
    # PRs — it is a release gate and still runs in full on every push to
    # main after merge, and a human rebase/re-run gets the secret normally.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout sdk-ruby
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          path: sdk-ruby

      - name: Checkout integration-test-data
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          # Pinned per the 2026-05-13 reliability audit so the chaos
          # gate moves only when the scenarios are deliberately
          # rev'd. Bump alongside the matching SDK change.
          ref: v2026.05.13

      - name: Checkout api-delivery
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # api-delivery is private; the default GITHUB_TOKEN cannot
          # read it. A PAT or fine-grained token with read access to
          # quonfig/api-delivery must be configured as the repo secret
          # QUONFIG_REPO_TOKEN. Without it this step fails fast and
          # the chaos gate is red — by design, until the secret is
          # provisioned.
          repository: quonfig/api-delivery
          path: api-delivery
          ref: main
          token: ${{ secrets.QUONFIG_REPO_TOKEN }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26'
          cache-dependency-path: api-delivery/go.sum

      - name: Set up Ruby
        uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f  # v1.306.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: sdk-ruby

      - name: Verify docker compose available
        run: docker compose version

      - name: Run chaos harness
        working-directory: sdk-ruby
        env:
          # Smoke skips 11-null-hypothesis (30 min idle). Full suite
          # runs everything. The wrapper honors CHAOS_SKIP.
          CHAOS_SKIP: ${{ inputs.mode == 'full' && '' || '11' }}
        run: ./scripts/run-chaos.sh

      - name: Upload chaos logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: chaos-logs-${{ github.run_id }}
          path: |
            sdk-ruby/.chaos-api-delivery
            sdk-ruby/chaos-*.log
          if-no-files-found: ignore
          retention-days: 7
