name: Test
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Ruby ${{ matrix.ruby-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.2', '3.3', '3.4']
    steps:
      - name: Checkout sdk-ruby
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          path: sdk-ruby

      - name: Checkout integration-test-data
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          ref: main

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@e5517072e87f198d9533967ae13d97c11b604005  # v1.99.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: sdk-ruby

      - name: Run tests
        working-directory: sdk-ruby
        run: bundle exec rake test

      # Soft-fail: sdk-ruby has never been linted; an initial run reports
      # ~2772 offenses (2421 autocorrectable). Tracked in qfg-rsc0 — remove
      # continue-on-error once that resolves.
      - name: Rubocop
        working-directory: sdk-ruby
        continue-on-error: true
        run: bundle exec rubocop --no-color

      # Soft-fail: faraday 1.10.3 has GHSA-33mh-2634-fwr2 (SSRF). Tracked
      # in qfg-ubpz — remove continue-on-error once faraday is bumped.
      - name: Bundler-audit
        working-directory: sdk-ruby
        continue-on-error: true
        run: bundle exec bundle-audit check --update

      # --force scans non-Rails code (sdk-ruby is a client gem, not a Rails
      # app). Currently reports 0 warnings.
      - name: Brakeman
        working-directory: sdk-ruby
        run: bundle exec brakeman --no-pager --force
