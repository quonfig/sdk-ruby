name: Test
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Ruby ${{ matrix.ruby-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby-version: ['3.2', '3.3', '3.4']
    steps:
      - name: Checkout sdk-ruby
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          path: sdk-ruby

      - name: Checkout integration-test-data
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: quonfig/integration-test-data
          path: integration-test-data
          # Pinned to a tag (not main) so a typo in shared YAML can't
          # break every SDK's CI at once. Bump to a newer tag when
          # adopting new test cases. See integration-test-data/RELEASING.md.
          ref: v2026.05.20

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f  # v1.310.0
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true
          working-directory: sdk-ruby

      # Node is needed only to run the integration-test-data generator below.
      - name: Set up Node (integration-test generator)
        if: matrix.ruby-version == '3.4'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      # The test/integration/test_*.rb files are produced by the
      # integration-test-data generator, not hand-written. Generation is a
      # manual step, so a change to the shared YAML (or the generator) that
      # isn't regenerated here would leave these tests stale while CI stayed
      # green against the old copy. Regenerate from the pinned tag and fail if
      # anything differs from what is committed (the Ruby generator emits
      # rubocop-clean code, so no format pass is needed).
      - name: Check generated integration tests are in sync
        if: matrix.ruby-version == '3.4'
        working-directory: sdk-ruby
        run: |
          (cd ../integration-test-data/generators && npm ci && npm run generate -- --target=ruby)
          git diff --exit-code test/integration/ \
            || { echo "::error::Generated integration tests are out of sync with integration-test-data. Run 'npm run generate -- --target=ruby' in integration-test-data/generators and commit the result."; exit 1; }

      - name: Run tests
        working-directory: sdk-ruby
        run: bundle exec rake test

      - name: Rubocop
        working-directory: sdk-ruby
        run: bundle exec rubocop --no-color

      - name: Bundler-audit
        working-directory: sdk-ruby
        run: bundle exec bundle-audit check --update

      # --force scans non-Rails code (sdk-ruby is a client gem, not a Rails
      # app). Currently reports 0 warnings.
      - name: Brakeman
        working-directory: sdk-ruby
        run: bundle exec brakeman --no-pager --force
